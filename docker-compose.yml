services:
  redis:
    image: redis:alpine
    ports:
      - '6379:6379'

  web:
    build: .
    # Daphne o'rniga runserver ishlatamiz (orqa fonda baribir Daphne ishlaydi)
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis
    environment:
      - REDIS_URL=redis://redis:6379/0