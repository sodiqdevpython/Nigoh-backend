services:
  redis:
    image: redis:alpine
    container_name: nigoh_redis
    restart: always
    ports:
      - '6379:6379'

  db:
    image: postgres:15-alpine
    container_name: nigoh_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: nigoh_web
    restart: always
    command: gunicorn config.wsgi:application -w 2 -b 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db 
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - PYTHONUNBUFFERED=1

volumes:
  postgres_data: