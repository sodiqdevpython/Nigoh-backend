services:
  redis:
    image: redis:alpine
    container_name: nigoh_redis
    restart: always
    # ═══════════════════════════════════════════════════════════════
    # 3 qavat himoya:
    # 1) --save '' + --appendonly no   → persistence yo'q, restart'da toza state
    # 2) --replica-read-only no        → agar biror sabab bilan replica bo'lsa ham yozadi
    # 3) HEALTHCHECK har 30 sek        → replica holati aniqlansa avto SLAVEOF NO ONE
    # ═══════════════════════════════════════════════════════════════
    command: >
      redis-server
      --save ""
      --appendonly no
      --replica-read-only no
      --protected-mode no
    healthcheck:
      # PING + role tekshirish. Replica bo'lsa darrov master ga o'giradi.
      test: >
        sh -c "redis-cli PING > /dev/null &&
               (redis-cli INFO replication | grep -q 'role:master' ||
                redis-cli SLAVEOF NO ONE)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    ports:
      - '6379:6379'

  db:
    image: postgres:15-alpine
    container_name: nigoh_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    ports:
      - "5432:5432"

  web:
    build: .
    container_name: nigoh_web
    restart: always
    command: >
      sh -c "python manage.py migrate --noinput &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db
    env_file:
      - .env
    environment:
      - DJANGO_SETTINGS_MODULE=config.settings
      - PYTHONUNBUFFERED=1
    pids_limit: -1
    security_opt:
      - seccomp=unconfined
    ulimits:
      nproc: 65535
      nofile:
        soft: 65535
        hard: 65535

volumes:
  postgres_data: