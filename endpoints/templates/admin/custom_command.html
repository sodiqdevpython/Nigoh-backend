{% extends "admin/base_site.html" %}
{% block content %}
<h2>Tanlangan kompyuterlarga maxsus buyruq yuborish</h2>

<form action="" method="post">
    {% csrf_token %}
    
    {% for obj in queryset %}
        <input type="hidden" name="_selected_action" value="{{ obj.pk }}" />
    {% endfor %}
    <input type="hidden" name="action" value="send_custom_command" />

    <div style="margin-bottom: 15px;">
        <label style="font-weight:bold; display:block; margin-bottom:5px;">Type:</label>
        <input type="text" name="cmd_type" value="command" required style="width: 400px; padding: 8px;">
    </div>

    <div style="margin-bottom: 15px;">
        <label style="font-weight:bold; display:block; margin-bottom:5px;">Action:</label>
        <input type="text" name="cmd_action" placeholder="Masalan: open_url, lock_screen" required style="width: 400px; padding: 8px;">
    </div>

    <div style="margin-bottom: 15px;">
        <label style="font-weight:bold; display:block; margin-bottom:5px;">Message (Ixtiyoriy):</label>
        <input type="text" name="cmd_message" placeholder="Xabar matni" style="width: 400px; padding: 8px;">
    </div>

    <div style="margin-bottom: 15px;">
        <label style="font-weight:bold; display:block; margin-bottom:5px;">Payload (JSON formatida, ixtiyoriy):</label>
        <textarea name="cmd_payload" rows="6" style="width: 400px; padding: 8px;">{}</textarea>
    </div>

    <input type="submit" name="apply" value="Buyruqni Yuborish" style="padding: 10px 20px; cursor: pointer; background: #417690; color: white; border: none; font-weight: bold; border-radius: 4px;">
</form>
{% endblock %}
